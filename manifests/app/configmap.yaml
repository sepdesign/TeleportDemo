apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-site
  namespace: web
data:
  index.html: |
    <!doctype html>
    <html lang="en">
    <head>
      <meta charset="utf-8">
      <meta name="viewport" content="width=device-width, initial-scale=1">
      <title>Teleport Demo</title>
      <style>
        body { font-family: system-ui, sans-serif; background: #0f172a; color: #e2e8f0; display: grid; place-items: center; height: 100vh; margin: 0; }
        main { text-align: center; max-width: 40rem; padding: 2rem; }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; }
        p { color: #94a3b8; line-height: 1.6; }
        code { color: #7dd3fc; }
      </style>
    </head>
    <body>
      <main>
        <h1>It works</h1>
        <p>Static site served from a three node <code>kubeadm</code> cluster on AWS.</p>
        <p>Deployed by a least privilege user. TLS issued by cert-manager and Let's Encrypt.</p>
      </main>
    </body>
    </html>
