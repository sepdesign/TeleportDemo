# Argo CD Application. The cluster reconciles the Nginx app from Git.
# Set repoURL to your GitHub repo before applying.
# selfHeal reverts manual drift. prune removes resources deleted from Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-site
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sepdesign/TeleportDemo.git
    targetRevision: main
    path: manifests/app
  destination:
    server: https://kubernetes.default.svc
    namespace: web
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
